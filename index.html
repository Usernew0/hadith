<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سُنّة - Sunnah.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Amiri', sans-serif; }
    .hadith-card { transition: all 0.3s; }
    .hadith-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .section-card { transition: all 0.3s; }
    .section-card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-[#f8f1e3] text-[#1a1a1a]">
  <!-- HEADER -->
  <header class="bg-[#8b4513] text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h1 class="text-3xl font-bold">سُنّة</h1>
        <div class="hidden md:block text-sm text-amber-200">الكتب الستة</div>
      </div>
      
      <!-- SEARCH BAR -->
      <div class="flex-1 max-w-2xl mx-8">
        <div class="relative">
          <input id="searchInput" 
                 type="text" 
                 placeholder="ابحث عن حديث (مثلاً: الصلاة على النبي ﷺ)"
                 class="w-full bg-white text-[#1a1a1a] rounded-3xl py-3 px-6 pr-12 focus:outline-none focus:ring-2 focus:ring-[#8b4513]">
          <button onclick="performSearchImmediate()" 
                  class="absolute left-4 top-1/2 -translate-y-1/2 bg-[#8b4513] text-white px-6 py-2 rounded-3xl hover:bg-[#a67c5d]">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <button onclick="window.location.reload()" class="hover:text-amber-200">
          <i class="fas fa-home text-2xl"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 flex gap-8 py-8">
    <!-- SIDEBAR -->
    <div class="w-80 flex-shrink-0 bg-white rounded-2xl shadow p-6 h-fit">
      <h2 class="text-xl font-bold mb-6 text-[#8b4513]">الكتب</h2>
      <div id="sidebarCollections" class="space-y-4"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1">
      <div id="mainContent"></div>
    </div>
  </div>

  <script>
    const GITHUB_BASE = "https://raw.githubusercontent.com/Usernew0/hadith/main/jsontocsv/files/";
    const API_BASE = "https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1";

    const collections = [
      { name: "صحيح البخاري", slug: "bukhari", araFile: "ara-bukhari", engFile: "eng-bukhari" },
      { name: "صحيح مسلم", slug: "muslim", araFile: "ara-muslim", engFile: "eng-muslim" },
      { name: "سنن أبي داود", slug: "abudawud", araFile: "ara-abudawud", engFile: "eng-abudawud" },
      { name: "جامع الترمذي", slug: "tirmidhi", araFile: "ara-tirmidhi", engFile: "eng-tirmidhi" },
      { name: "سنن النسائي", slug: "nasai", araFile: "ara-nasai", engFile: "eng-nasai" },
      { name: "جامع الترمذي", slug: "tirmidhi", araFile: "ara-tirmidhi", engFile: "eng-tirmidhi" },
      { name: "جامع الترمذي", slug: "tirmidhi", araFile: "ara-tirmidhi", engFile: "eng-tirmidhi" },
      { name: "جامع الترمذي", slug: "tirmidhi", araFile: "ara-tirmidhi", engFile: "eng-tirmidhi" },
    ];

    let debounceTimer;

    function debounceSearch(func, delay = 300) {
      return function(...args) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => func.apply(this, args), delay);
      };
    }

    function loadSidebar() {
      const container = document.getElementById("sidebarCollections");
      collections.forEach(col => {
        const div = document.createElement("div");
        div.className = "p-3 hover:bg-amber-50 rounded-xl cursor-pointer";
        div.innerHTML = `<span class="font-medium">${col.name}</span>`;
        div.onclick = () => loadCollection(col.slug);
        container.appendChild(div);
      });
    }

    async function loadCollection(slug) {
      const col = collections.find(c => c.slug === slug);
      if (!col) return;

      try {
        const [resAra, resEng] = await Promise.all([
          fetch(`${GITHUB_BASE}${col.araFile}.json`),
          fetch(`${GITHUB_BASE}${col.engFile}.json`)
        ]);

        if (!resAra.ok || !resEng.ok) throw new Error("Data not found");

        const dataAra = await resAra.json();
        const dataEng = await resEng.json();

        let html = `<h1 class="text-4xl font-bold mb-8">${dataAra.metadata.name}</h1>`;

        Object.entries(dataAra.metadata.sections).forEach(([id, sectionName]) => {
          if (id === "0") return;

          const bookHadiths = dataEng.hadiths.filter(h => h.reference.book === parseInt(id));
          const sectionEng = dataEng.metadata.sections[id] || sectionName || `الكتاب ${id}`;

          html += `
            <div class="section-card bg-white rounded-2xl shadow mb-6 overflow-hidden cursor-pointer" onclick="loadBook('${slug}', ${id})">
              <div class="bg-[#8b4513] text-white px-6 py-4 font-bold text-xl">
                ${sectionName || sectionEng}
              </div>
              <div class="p-6">
                <div class="flex justify-between items-center">
                  <div>
                    <span class="text-[#8b4513] font-bold">الكتاب ${id}</span>
                    ${sectionEng && sectionEng !== sectionName ? `<span class="text-sm text-gray-500 mr-2">(${sectionEng})</span>` : ''}
                  </div>
                  <p class="text-sm text-gray-500">${bookHadiths.length} حديث</p>
                </div>
              </div>
            </div>
          `;
        });

        document.getElementById("mainContent").innerHTML = html;
      } catch (e) {
        document.getElementById("mainContent").innerHTML = `<h1 class="text-4xl font-bold mb-8 text-red-500">خطأ في تحميل البيانات</h1>`;
      }
    }

    async function loadBook(collection, bookId) {
      const col = collections.find(c => c.slug === collection);
      try {
        const [resAra, resEng] = await Promise.all([
          fetch(`${GITHUB_BASE}${col.araFile}.json`),
          fetch(`${GITHUB_BASE}${col.engFile}.json`)
        ]);

        const dataAra = await resAra.json();
        const dataEng = await resEng.json();

        const bookHadiths = dataEng.hadiths.filter(h => h.reference.book === parseInt(bookId));
        const sectionName = dataAra.metadata.sections[bookId] || dataEng.metadata.sections[bookId] || `الكتاب ${bookId}`;

        let html = `<h1 class="text-4xl font-bold mb-8">${dataAra.metadata.name} - ${sectionName}</h1>`;

        html += bookHadiths.map(h => {
          const arabicHadith = dataAra.hadiths.find(ha => 
            ha.reference.book === h.reference.book && 
            ha.reference.hadith === h.reference.hadith
          );
          return `
            <div class="bg-white p-6 rounded-2xl shadow mb-4 hadith-card">
              <div class="text-[#8b4513] font-bold">${h.reference.book}/${h.reference.hadith}</div>
              <div class="mt-3 text-xl leading-relaxed">${arabicHadith ? arabicHadith.text : ''}</div>
              <div class="text-gray-600 mt-4">${h.text || h.english}</div>
            </div>
          `;
        }).join('');

        document.getElementById("mainContent").innerHTML = html;
      } catch (e) {
        document.getElementById("mainContent").innerHTML = `<h1 class="text-red-500">خطأ في تحميل الكتاب</h1>`;
      }
    }

    // Debounced Search
    const debouncedSearch = debounceSearch(async (query) => {
      if (!query || query.length < 2) return;

      try {
        const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
        const results = await res.json();

        let html = `<h2 class="text-2xl font-bold mb-4">نتائج البحث عن "${query}" (${results.length})</h2>`;
        
        if (results.length === 0) {
          html += `<p class="text-gray-500 text-lg">لم يتم العثور على نتائج</p>`;
        } else {
          html += results.map(h => `
            <div class="bg-white p-6 rounded-2xl mb-4">
              <div class="text-[#8b4513] font-bold text-lg">${h.reference}</div>
              <div class="mt-3 text-xl">${h.arabic || ''}</div>
              <div class="text-gray-600 mt-2">${h.english || h.text}</div>
            </div>
          `).join('');
        }

        document.getElementById("mainContent").innerHTML = html;
      } catch (e) {
        document.getElementById("mainContent").innerHTML = `<h2 class="text-red-500">حدث خطأ أثناء البحث</h2>`;
      }
    }, 350);

    // Trigger search on input
    function setupSearch() {
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", (e) => {
        debouncedSearch(e.target.value.trim());
      });
    }

    // Manual search (button)
    function performSearchImmediate() {
      const query = document.getElementById("searchInput").value.trim();
      if (query) debouncedSearch(query); // Force immediate search
    }

    // Init
    window.onload = () => {
      loadSidebar();
      loadCollection("bukhari");
      setupSearch();
    };
  </script>
</body>
</html>
